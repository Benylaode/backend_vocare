swagger: "2.0"
info:
  title: Medical Records API
  description: API lengkap untuk Vocare (Manajemen Rekam Medis AI-Assisted).
  version: 1.2.0
host: localhost:5000
basePath: /
schemes:
  - http

produces:
  - application/json
consumes:
  - application/json

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Format: 'Bearer {token}'"

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autentikasi User
  - name: Users
    description: Manajemen Pengguna (Admin Only)
  - name: Patients
    description: Data Pasien
  - name: Assesments
    description: Form Pengkajian Awal & TTV
  - name: Laporan
    description: Analisis Askeb (SDKI, SIKI, SLKI)
  - name: CPPT
    description: Catatan Perkembangan Pasien Terintegrasi
  - name: Intervensi
    description: Implementasi & Evaluasi Tindakan
  - name: PDF Processing
    description: Upload & Ekstraksi Dokumen (RAG)

definitions:
  # --- USER & AUTH ---
  User:
    type: object
    properties:
      id:
        type: integer
      username:
        type: string
      email:
        type: string
      role:
        type: string
        enum: [admin, user, ketim]
      ruangan:
        type: string

  NewUser:
    type: object
    required: [username, email, password]
    properties:
      username:
        type: string
      email:
        type: string
      password:
        type: string
        format: password
      role:
        type: string
        enum: [admin, user, ketim]
        default: user
      ruangan:
        type: string

  LoginCredentials:
    type: object
    required: [username, password]
    properties:
      username:
        type: string
      password:
        type: string
        format: password

  # --- PATIENT ---
  Patient:
    type: object
    properties:
      id:
        type: integer
      no_rekam_medis:
        type: string
      nama:
        type: string
      ruangan:
        type: string
      tgl_lahir:
        type: string
        format: date
      jenis_kelamin:
        type: string
      status_rawat:
        type: string

  PatientInput:
    type: object
    required: [nama, no_rekam_medis, ruangan, tgl_lahir]
    properties:
      nama:
        type: string
      no_rekam_medis:
        type: string
      ruangan:
        type: string
      tgl_lahir:
        type: string
        format: date
        example: "1990-01-01"
      jenis_kelamin:
        type: string
        enum: [Laki-laki, Perempuan]
      alamat:
        type: string
      penanggung_jawab:
        type: string

  # --- MEDICAL RECORDS ---
  Assesment:
    type: object
    properties:
      id:
        type: integer
      tanggal:
        type: string
        format: date-time
      perawat:
        type: string
      data:
        type: object
        description: "JSON Data (TTV, Fisik, dll)"

  Laporan:
    type: object
    properties:
      id:
        type: integer
      patient_id:
        type: integer
      tanggal:
        type: string
        format: date-time
      subjective:
        type: string
      objective:
        type: string
      assessment:
        type: string
      plan:
        type: string
      SDKI:
        type: array
        items: {type: string}
      SIKI:
        type: array
        items: {type: string}
      SLKI:
        type: array
        items: {type: string}

  CPPT:
    type: object
    properties:
      id:
        type: integer
      patient_id:
        type: integer
      shift:
        type: string
      tanggal:
        type: string
        format: date-time
      subjective:
        type: string
      objective:
        type: string
      assessment:
        type: string
      plan:
        type: string

  Intervensi:
    type: object
    properties:
      id:
        type: integer
      patient_id:
        type: integer
      implementasi:
        type: string
      evaluasi:
        type: string
      tanggal:
        type: string
        format: date-time

  # --- INPUTS ---
  AssesmentInput:
    type: object
    required: [query, patient_id]
    properties:
      query:
        type: string
        description: "Narasi observasi awal (mengandung RM)"
      patient_id:
        type: integer

  LaporanInput:
    type: object
    required: [patient_id, query]
    properties:
      patient_id:
        type: integer
      query:
        type: string
      assesment_id:
        type: integer

  CPPTInput:
    type: object
    required: [patient_id]
    properties:
      patient_id:
        type: integer
      query:
        type: string
        description: "Update kondisi terkini"

  IntervensiInput:
    type: object
    required: [patient_id, implementasi, evaluasi, user_id]
    properties:
      patient_id:
        type: integer
      user_id:
        type: integer
      implementasi:
        type: string
      evaluasi:
        type: string

  Query:
    type: object
    properties:
      query:
        type: string

paths:
  # ================= AUTH =================
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrasi User
      security: []
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        '201':
          description: Created

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/LoginCredentials'
      responses:
        '200':
          description: Returns Token

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get Profile
      responses:
        '200':
          schema:
            $ref: '#/definitions/User'

  # ================= USERS =================
  /users/:
    get:
      tags: [Users]
      summary: List Users (Admin)
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
    post:
      tags: [Users]
      summary: Create User (Admin)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        '201':
          description: Created

  /users/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        type: integer
    get:
      tags: [Users]
      summary: Get User Detail
      responses:
        '200':
          schema:
            $ref: '#/definitions/User'
    put:
      tags: [Users]
      summary: Update User
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Users]
      summary: Delete User
      responses:
        '200':
          description: Deleted

  # ================= PATIENTS =================
  /patients/:
    get:
      tags: [Patients]
      summary: Get All Patients (Filtered by Room)
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Patient'
    post:
      tags: [Patients]
      summary: Create Patient
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/PatientInput'
      responses:
        '201':
          description: Created

  /patients/{patient_id}:
    parameters:
      - name: patient_id
        in: path
        required: true
        type: integer
    get:
      tags: [Patients]
      summary: Get Patient Detail
      responses:
        '200':
          schema:
            $ref: '#/definitions/Patient'
    put:
      tags: [Patients]
      summary: Update Patient
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/PatientInput'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Patients]
      summary: Delete Patient
      responses:
        '200':
          description: Deleted

  # ================= ASSESMENTS =================
  /assesments/:
    get:
      tags: [Assesments]
      summary: List Assesments (Filtered by Room)
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Assesment'
    post:
      tags: [Assesments]
      summary: Create Assesment (AI Extraction)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/AssesmentInput'
      responses:
        '201':
          description: Created

  /assesments/{assesment_id}:
    get:
      tags: [Assesments]
      summary: Get Single Assesment by ID
      parameters:
        - name: assesment_id
          in: path
          required: true
          type: integer
      responses:
        '200':
          schema:
            $ref: '#/definitions/Assesment'

  /assesments/search:
    post:
      tags: [Assesments]
      summary: Search History Assesment (Semantic)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/Query'
      responses:
        '200':
          description: Search results

  /assesments/questions:
    get:
      tags: [Assesments]
      summary: Get AI Generated Questions
      responses:
        '200':
          description: JSON pertanyaan untuk pasien & perawat

  # ================= LAPORAN (ASKEB) =================
  /laporan/:
    get:
      tags: [Laporan]
      summary: List All Laporan
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Laporan'
    post:
      tags: [Laporan]
      summary: Create Askeb (AI Analysis)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/LaporanInput'
      responses:
        '201':
          description: Created

  /laporan/{laporan_id}:
    parameters:
      - name: laporan_id
        in: path
        required: true
        type: integer
    get:
      tags: [Laporan]
      summary: Get Laporan Detail
      responses:
        '200':
          schema:
            $ref: '#/definitions/Laporan'
    put:
      tags: [Laporan]
      summary: Update Laporan
      parameters:
        - in: body
          name: body
          schema:
             $ref: '#/definitions/Laporan' # Partial update allowed
      responses:
        '200':
          description: Updated
    delete:
      tags: [Laporan]
      summary: Delete Laporan
      responses:
        '200':
          description: Deleted

  /laporan/search:
    get:
      tags: [Laporan]
      summary: Search Laporan (Text Based)
      parameters:
        - name: q
          in: query
          required: true
          type: string
      responses:
        '200':
          description: Search results

  # ================= CPPT =================
  /cppt/:
    get:
      tags: [CPPT]
      summary: List All CPPT
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/CPPT'
    post:
      tags: [CPPT]
      summary: Create CPPT (Auto Shift)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/CPPTInput'
      responses:
        '201':
          description: Created

  /cppt/{cppt_id}:
    parameters:
      - name: cppt_id
        in: path
        required: true
        type: integer
    get:
      tags: [CPPT]
      summary: Get CPPT Detail
      responses:
        '200':
          schema:
            $ref: '#/definitions/CPPT'
    put:
      tags: [CPPT]
      summary: Update CPPT
      parameters:
        - in: body
          name: body
          schema:
             $ref: '#/definitions/CPPT'
      responses:
        '200':
          description: Updated
    delete:
      tags: [CPPT]
      summary: Delete CPPT
      responses:
        '200':
          description: Deleted

  # ================= INTERVENSI =================
  /intervensi/:
    get:
      tags: [Intervensi]
      summary: List Intervensi
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Intervensi'
    post:
      tags: [Intervensi]
      summary: Create Intervensi
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/IntervensiInput'
      responses:
        '201':
          description: Created

  /intervensi/{intervensi_id}:
    parameters:
      - name: intervensi_id
        in: path
        required: true
        type: integer
    get:
      tags: [Intervensi]
      summary: Get Intervensi Detail
      responses:
        '200':
          schema:
            $ref: '#/definitions/Intervensi'
    put:
      tags: [Intervensi]
      summary: Update Intervensi
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/IntervensiInput'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Intervensi]
      summary: Delete Intervensi
      responses:
        '200':
          description: Deleted

  /intervensi/search:
    post:
      tags: [Intervensi]
      summary: Search Intervensi
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/Query'
      responses:
        '200':
          description: Found

  # ================= PDF PROCESSING =================
  /pdf/process-assesmen:
    post:
      tags: [PDF Processing]
      summary: Upload PDF Assesmen (Admin/Ketim)
      consumes: [multipart/form-data]
      parameters:
        - name: file
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Processed

  /pdf/process-lab:
    post:
      tags: [PDF Processing]
      summary: Upload PDF Hasil Lab
      consumes: [multipart/form-data]
      parameters:
        - name: file
          in: formData
          type: file
          required: true
        - name: cppt_id
          in: formData
          type: integer
          required: true
      responses:
        '200':
          description: Processed

  /pdf/process-permenkes:
    post:
      tags: [PDF Processing]
      summary: Upload PDF Permenkes (Admin Only)
      consumes: [multipart/form-data]
      parameters:
        - name: file
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Processed

  /pdf/process-siki-slki-sdki:
    post:
      tags: [PDF Processing]
      summary: Upload PDF Referensi SDKI/SIKI/SLKI
      consumes: [multipart/form-data]
      parameters:
        - name: file
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Processed