swagger: "2.0"
info:
  title: Medical Records API (Vocare v1.4.3)
  description: "API Manajemen Rekam Medis AI-Assisted dengan dukungan RAG (Retrieval-Augmented Generation). Mendukung OCR PDF, pencarian semantik FAISS, dan otomatisasi Asuhan Keperawatan."
  version: 1.4.3
host: localhost:5000
basePath: /
schemes:
  - http

produces:
  - application/json
consumes:
  - application/json

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Format: 'Bearer {token}'"

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autentikasi User & Profil
  - name: Patients
    description: Data Pasien & Penautan Asesmen
  - name: Assesments
    description: CRUD Asesmen, Semantic Search, & AI Smart Questions
  - name: Laporan
    description: Analisis ASKEB (SDKI, SIKI, SLKI)
  - name: CPPT
    description: Catatan Perkembangan (SOAP) & Auto-Shift
  - name: Intervensi
    description: Implementasi & Evaluasi Tindakan
  - name: PDF Processing
    description: Upload & Ekstraksi Dokumen (RAG Knowledge Base)

definitions:
  # --- USER & AUTH ---
  User:
    type: object
    properties:
      id: { type: integer }
      username: { type: string }
      email: { type: string }
      role: { type: string, enum: [admin, user, ketim] }
      ruangan: { type: string }

  NewUser:
    type: object
    required: [username, email, password]
    properties:
      username: { type: string }
      email: { type: string }
      password: { type: string, format: password }
      role: { type: string, enum: [admin, user, ketim], default: user }
      ruangan: { type: string }

  # --- PATIENT ---
  PatientInput:
    type: object
    required: [nama, no_rekam_medis, ruangan, tgl_lahir]
    properties:
      nama: { type: string }
      no_rekam_medis: { type: string }
      ruangan: { type: string }
      tgl_lahir: { type: string, format: date, example: "1990-01-01" }
      jenis_kelamin: { type: string, enum: [Laki-laki, Perempuan] }
      alamat: { type: string }
      penanggung_jawab: { type: string }
      status_rawat: { type: string, default: "rawat_inap" }
      assesment_id:
        type: integer
        description: "Opsional. Menautkan draf asesmen yang sudah ada ke pasien baru ini."

  # --- MEDICAL RECORDS ---
  AssesmentDetail:
    type: object
    properties:
      id: { type: integer }
      tanggal: { type: string, format: date-time }
      perawat: { type: string }
      data: { type: object, description: "Hasil ekstraksi JSON oleh AI" }
      patient_id: { type: integer, allowEmptyValue: true }
      patient_rm: { type: string, example: "123456 atau Draft / Belum Ditentukan" }

  LaporanDetail:
    type: object
    properties:
      id: { type: integer }
      patient_id: { type: integer }
      tanggal: { type: string, format: date-time }
      subjective: { type: string }
      objective: { type: string }
      assessment: { type: string }
      plan: { type: string }
      SDKI: { type: array, items: { type: string } }
      SIKI: { type: array, items: { type: string } }
      SLKI: { type: array, items: { type: string } }
      user_id: { type: integer }

paths:
  # ================= AUTH =================
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrasi User Baru
      security: []
      parameters:
        - in: body
          name: body
          schema: { $ref: '#/definitions/NewUser' }
      responses:
        201: { description: User Created }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login User
      security: []
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [username, password]
            properties:
              username: { type: string }
              password: { type: string, format: password }
      responses:
        200: { description: Success, schema: { type: object, properties: { access_token: { type: string } } } }

  # ================= PATIENTS =================
  /patients/:
    get:
      tags: [Patients]
      summary: List Pasien (Filtered by Room)
      responses:
        200: { description: Success }
    post:
      tags: [Patients]
      summary: Create Patient & Link Assesment
      parameters:
        - in: body
          name: body
          schema: { $ref: '#/definitions/PatientInput' }
      responses:
        201: { description: "Pasien Terdaftar & Linked to Assessment" }

  # ================= ASSESMENTS =================
  /assesments/:
    get:
      tags: [Assesments]
      summary: Get All Assesments (Outer Join)
      description: "Menampilkan semua asesmen. Non-admin difilter berdasarkan ruangan atau kepemilikan data."
      responses:
        200: { description: Success }
    post:
      tags: [Assesments]
      summary: Create AI Assesment (Standalone/Linked)
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [query]
            properties:
              query: { type: string }
              patient_id: { type: integer, description: "Kosongkan jika hanya draf" }
      responses:
        201: { description: Created }

  /assesments/{assesment_id}:
    parameters:
      - name: assesment_id
        in: path
        required: true
        type: integer
    get:
      tags: [Assesments]
      summary: Get Assesment Detail
      responses:
        200: { schema: { $ref: '#/definitions/AssesmentDetail' } }
    put:
      tags: [Assesments]
      summary: Update Assesment / Link Patient
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              data: { type: object }
              patient_id: { type: integer, description: "Kirim null untuk unlink" }
      responses:
        200: { description: Updated }
    delete:
      tags: [Assesments]
      summary: Delete Assesment (SQL & FAISS Index Sync)
      responses:
        200: { description: Deleted }

  /assesments/search:
    post:
      tags: [Assesments]
      summary: Semantic Semantic Search (FAISS Based)
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [query]
            properties:
              query: { type: string }
      responses:
        200: { description: Success }

  /assesments/questions:
    get:
      tags: [Assesments]
      summary: Get AI Smart Questions (RAG Based)
      responses:
        200: { description: Success }

  # ================= LAPORAN (ASKEB) =================
  /laporan/:
    get:
      tags: [Laporan]
      summary: List Laporan (Filtered by Room)
      responses:
        200: { description: Success }
    post:
      tags: [Laporan]
      summary: Create ASKEB via AI & RAG
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [patient_id, query]
            properties:
              patient_id: { type: integer }
              query: { type: string }
      responses:
        201: { description: Created }

  # ================= CPPT =================
  /cppt/:
    post:
      tags: [CPPT]
      summary: Create SOAP generation via AI
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [patient_id, query]
            properties:
              patient_id: { type: integer }
              query: { type: string }
      responses:
        201: { description: Created }

  # ================= PDF PROCESSING =================
  /pdf/process-lab:
    post:
      tags: [PDF Processing]
      summary: Upload PDF Hasil Lab (OCR Based)
      consumes: [multipart/form-data]
      parameters:
        - name: file
          in: formData
          type: file
          required: true
        - name: cppt_id
          in: formData
          type: integer
          required: true
      responses:
        200: { description: Indexed }