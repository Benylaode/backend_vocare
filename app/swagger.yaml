swagger: "2.0"
info:
  title: Medical Records API (Vocare v1.4.3)
  description: "Dokumentasi API lengkap untuk Manajemen Rekam Medis AI-Assisted. Mendukung RAG (Retrieval-Augmented Generation), OCR untuk PDF, dan integrasi FAISS untuk asuhan keperawatan pintar."
  version: 1.4.3
host: localhost:5000
basePath: /
schemes:
  - http

produces:
  - application/json
consumes:
  - application/json

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Format: 'Bearer {token}'"

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autentikasi User & Profil
  - name: Patients
    description: Manajemen Pasien & Penautan Asesmen
  - name: Assesments
    description: CRUD Asesmen, Semantic Search, & AI Smart Questions
  - name: Laporan
    description: Analisis ASKEB (SDKI, SIKI, SLKI)
  - name: CPPT
    description: Catatan Perkembangan (SOAP) & Auto-Shift
  - name: Intervensi
    description: Implementasi & Evaluasi Tindakan
  - name: PDF Processing
    description: Upload PDF & RAG Indexing (Knowledge Base)

definitions:
  # --- MODELS ---
  User:
    type: object
    properties:
      id: { type: integer }
      username: { type: string }
      email: { type: string }
      role: { type: string, enum: [admin, user, ketim] }
      ruangan: { type: string }

  PatientInput:
    type: object
    required: [nama, no_rekam_medis, ruangan, tgl_lahir]
    properties:
      nama: { type: string }
      no_rekam_medis: { type: string }
      ruangan: { type: string }
      tgl_lahir: { type: string, format: date, example: "1990-01-01" }
      jenis_kelamin: { type: string, enum: [Laki-laki, Perempuan] }
      alamat: { type: string }
      status_rawat: { type: string, enum: [rawat_inap, rawat_jalan, pulang, meninggal], default: "rawat_inap" }
      assesment_id:
        type: integer
        description: "Menautkan draf asesmen yang sudah ada ke pasien baru ini."

  LaporanDetail:
    type: object
    properties:
      id: { type: integer }
      patient_id: { type: integer }
      tanggal: { type: string, format: date-time }
      subjective: { type: string }
      objective: { type: string }
      assessment: { type: string }
      plan: { type: string }
      tindakan_lanjutan: { type: string }
      keterangan: { type: string }
      SDKI: { type: array, items: { type: string } }
      SIKI: { type: array, items: { type: string } }
      SLKI: { type: array, items: { type: string } }
      user_id: { type: integer }

paths:
  # ================= PATIENTS =================
  /patients/:
    get:
      tags: [Patients]
      summary: List Semua Pasien (Filtered by Room)
      responses:
        200: { description: Success }
    post:
      tags: [Patients]
      summary: Register Pasien & Tautkan Asesmen
      parameters:
        - in: body
          name: body
          schema: { $ref: '#/definitions/PatientInput' }
      responses:
        201: { description: "Pasien terdaftar & Linked to Assessment ID X" }

  /patients/{patient_id}:
    parameters:
      - name: patient_id
        in: path
        required: true
        type: integer
    delete:
      tags: [Patients]
      summary: Hapus Pasien
      responses:
        200: { description: Pasien dihapus }

  # ================= ASSESMENTS =================
  /assesments/:
    get:
      tags: [Assesments]
      summary: Get All Assesments (Outer Join Patient)
      responses:
        200: { description: Success }
    post:
      tags: [Assesments]
      summary: Create AI Assesment (Standalone/Linked)
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [query]
            properties:
              query: { type: string }
              patient_id: { type: integer, description: "Kosongkan jika ingin draf" }
      responses:
        201: { description: Assesment created }

  /assesments/{assesment_id}:
    parameters:
      - name: assesment_id
        in: path
        required: true
        type: integer
    get:
      tags: [Assesments]
      summary: Get Single Assesment Detail
      responses:
        200: { description: Success }
    put:
      tags: [Assesments]
      summary: Update Asesmen / Link Patient ID
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              data: { type: object }
              patient_id: { type: integer }
      responses:
        200: { description: Updated }
    delete:
      tags: [Assesments]
      summary: Hapus Asesmen (SQL & FAISS Index)
      responses:
        200: { description: Deleted from DB and FAISS }

  /assesments/search:
    post:
      tags: [Assesments]
      summary: Semantic Semantic Search (FAISS Based)
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [query]
            properties:
              query: { type: string }
      responses:
        200: { description: Search results }

  /assesments/questions:
    get:
      tags: [Assesments]
      summary: Get Smart AI Questions (RAG)
      responses:
        200: { description: Daftar pertanyaan berhasil dibuat }

  # ================= LAPORAN (ASKEB) =================
  /laporan/:
    get:
      tags: [Laporan]
      summary: List Laporan (Filtered by Room)
      responses:
        200: { description: Success }
    post:
      tags: [Laporan]
      summary: Generate ASKEB via AI & RAG
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [patient_id, query]
            properties:
              patient_id: { type: integer }
              query: { type: string }
      responses:
        201: { description: Laporan Created }

  /laporan/{id}:
    parameters:
      - name: id
        in: path
        required: true
        type: integer
    get:
      tags: [Laporan]
      summary: Get Laporan Detail
      responses:
        200: { description: success }
    put:
      tags: [Laporan]
      summary: Update Laporan (Manual Correction)
      parameters:
        - in: body
          name: body
          schema: { $ref: '#/definitions/LaporanDetail' }
      responses:
        200: { description: Updated }
    delete:
      tags: [Laporan]
      summary: Delete Laporan
      responses:
        200: { description: Deleted }

  # ================= CPPT =================
  /cppt/:
    post:
      tags: [CPPT]
      summary: Create CPPT (Auto SOAP generation)
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [patient_id, query]
            properties:
              patient_id: { type: integer }
              query: { type: string }
      responses:
        201: { description: CPPT Created }

  # ================= INTERVENSI =================
  /intervensi/:
    get:
      tags: [Intervensi]
      summary: List Intervensi
      responses:
        200: { description: Success }
    post:
      tags: [Intervensi]
      summary: Create Implementasi & Evaluasi
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required: [patient_id, implementasi, evaluasi, user_id]
            properties:
              patient_id: { type: integer }
              implementasi: { type: string }
              evaluasi: { type: string }
              user_id: { type: integer }
      responses:
        201: { description: Created }

  # ================= PDF PROCESSING =================
  /pdf/process-lab:
    post:
      tags: [PDF Processing]
      summary: Upload PDF Hasil Lab (OCR Based)
      consumes: [multipart/form-data]
      parameters:
        - name: file
          in: formData
          type: file
          required: true
        - name: cppt_id
          in: formData
          type: integer
          required: true
      responses:
        200: { description: Lab results indexed }