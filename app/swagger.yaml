swagger: "2.0"
info:
  title: Medical Records API
  description: API untuk mengelola data rekam medis pasien (Askeb, CPPT, Intervensi), pengguna, dan dokumen medis.
  version: 1.1.0
host: localhost:5000
basePath: /
schemes:
  - http

produces:
  - application/json
consumes:
  - application/json

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Masukkan token JWT dengan format: 'Bearer {token}'"

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Endpoint untuk autentikasi dan manajemen profil
  - name: Users
    description: Operasi CRUD untuk pengguna (memerlukan hak akses admin)
  - name: Patients
    description: Pengelolaan data pasien
  - name: Assesments
    description: Pengelolaan data Form Pengkajian Awal (TTV, Fisik, dll)
  - name: Laporan
    description: Pengelolaan Analisis Asuhan Keperawatan (SDKI, SIKI, SLKI)
  - name: CPPT
    description: Pengelolaan Catatan Perkembangan Pasien Terintegrasi
  - name: Intervensi
    description: Pengelolaan Implementasi dan Evaluasi Keperawatan
  - name: PDF Processing
    description: Endpoint untuk mengunggah dan memproses dokumen PDF

definitions:
  # --- USER DEFINITIONS ---
  User:
    type: object
    properties:
      id:
        type: integer
      username:
        type: string
      email:
        type: string
      role:
        type: string
        enum: [admin, user, ketim]
      ruangan:
        type: string
        description: "Ruangan tempat perawat bertugas"

  NewUser:
    type: object
    required:
      - username
      - email
      - password
    properties:
      username:
        type: string
      email:
        type: string
      password:
        type: string
        format: password
      role:
        type: string
        enum: [admin, user, ketim]
        default: user
      ruangan:
        type: string
        example: "Mawar"
        description: "Wajib diisi jika role adalah user/perawat"

  LoginCredentials:
    type: object
    required:
      - username
      - password
    properties:
      username:
        type: string
      password:
        type: string
        format: password

  # --- PATIENT DEFINITIONS ---
  Patient:
    type: object
    properties:
      id:
        type: integer
      no_rekam_medis:
        type: string
      nama:
        type: string
      ruangan:
        type: string
      tgl_lahir:
        type: string
        format: date
      jenis_kelamin:
        type: string
      status_rawat:
        type: string
        enum: [rawat_inap, rawat_jalan, pulang, meninggal]

  PatientInput:
    type: object
    required:
      - nama
      - no_rekam_medis
      - ruangan
      - tgl_lahir
    properties:
      nama:
        type: string
      no_rekam_medis:
        type: string
      ruangan:
        type: string
      tgl_lahir:
        type: string
        format: date
        example: "1990-01-01"
      jenis_kelamin:
        type: string
      alamat:
        type: string
      penanggung_jawab:
        type: string

  # --- MEDICAL RECORDS DEFINITIONS ---
  Assesment:
    type: object
    description: "Data mentah formulir pengkajian (TTV, Skrining, dll)"
    properties:
      id:
        type: integer
      tanggal:
        type: string
        format: date-time
      patient_id:
        type: integer
      perawat_nama:
        type: string
      data:
        type: object
        description: "JSON Object berisi TTV, BB, TB, dll"

  Laporan:
    type: object
    description: "Analisis Asuhan Keperawatan (Askeb)"
    properties:
      id:
        type: integer
      patient_id:
        type: integer
      assesment_id:
        type: integer
      tanggal:
        type: string
        format: date-time
      subjective:
        type: string
      objective:
        type: string
      assessment:
        type: string
      plan:
        type: string
      SDKI:
        type: array
        items:
          type: string
      SIKI:
        type: array
        items:
          type: string
      SLKI:
        type: array
        items:
          type: string

  CPPT:
    type: object
    properties:
      id:
        type: integer
      patient_id:
        type: integer
      tanggal:
        type: string
        format: date-time
      shift:
        type: string
        enum: [Pagi, Sore, Malam]
      subjective:
        type: string
      objective:
        type: string
      assessment:
        type: string
      plan:
        type: string

  Intervensi:
    type: object
    properties:
      id:
        type: integer
      patient_id:
        type: integer
      tanggal:
        type: string
        format: date-time
      implementasi:
        type: string
      evaluasi:
        type: string

  # --- INPUT PAYLOADS ---
  AssesmentInput:
    type: object
    required:
      - query
      - patient_id
    properties:
      query:
        type: string
        description: "Narasi observasi awal untuk diekstrak menjadi form"
      patient_id:
        type: integer

  LaporanInput:
    type: object
    required:
      - patient_id
    properties:
      patient_id:
        type: integer
      assesment_id:
        type: integer
        description: "Opsional: ID dari assessment yang menjadi dasar analisis"
      query:
        type: string
        description: "Observasi tambahan manual perawat"

  CPPTInput:
    type: object
    required:
      - patient_id
    properties:
      patient_id:
        type: integer
      query:
        type: string
        description: "Perkembangan kondisi pasien saat ini"

  IntervensiInput:
    type: object
    required:
      - patient_id
      - query
    properties:
      patient_id:
        type: integer
      query:
        type: string
        description: "Tindakan yang dilakukan atau evaluasi"

  Query:
    type: object
    properties:
      query:
        type: string

paths:
  # --- AUTH ---
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registrasi pengguna baru
      security: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        '201':
          description: Registrasi berhasil
        '400':
          description: Data tidak lengkap

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login pengguna
      security: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/LoginCredentials'
      responses:
        '200':
          description: Login berhasil, mengembalikan token dan ruangan

  /auth/profile:
    get:
      tags:
        - Auth
      summary: Profil pengguna (termasuk ruangan)
      responses:
        '200':
          description: Data profil
          schema:
            $ref: '#/definitions/User'

  # --- USERS ---
  /users/:
    get:
      tags:
        - Users
      summary: List semua pengguna (Admin only)
      responses:
        '200':
          description: Sukses
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
    post:
      tags:
        - Users
      summary: Admin membuat user baru
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        '201':
          description: Created

  /users/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        type: integer
    get:
      tags:
        - Users
      summary: Detail pengguna
      responses:
        '200':
          schema:
            $ref: '#/definitions/User'
    put:
      tags:
        - Users
      summary: Update pengguna (termasuk pindah ruangan)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/NewUser'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Users
      summary: Hapus pengguna
      responses:
        '200':
          description: Deleted

  # --- PATIENTS ---
  /patients/:
    get:
      tags:
        - Patients
      summary: Get Patients (Difilter berdasarkan ruangan perawat)
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Patient'
    post:
      tags:
        - Patients
      summary: Tambah Pasien Baru
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/PatientInput'
      responses:
        '201':
          description: Created

  /patients/{patient_id}:
    parameters:
      - name: patient_id
        in: path
        required: true
        type: integer
    get:
      tags:
        - Patients
      summary: Detail Pasien
      responses:
        '200':
          schema:
            $ref: '#/definitions/Patient'
    put:
      tags:
        - Patients
      summary: Update Pasien
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/PatientInput'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Patients
      summary: Hapus Pasien
      responses:
        '200':
          description: Deleted

  # --- ASSESMENTS (Form Pengkajian) ---
  /assesments/:
    post:
      tags:
        - Assesments
      summary: Buat Assesment Baru (Ekstraksi AI ke Form JSON)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/AssesmentInput'
      responses:
        '201':
          description: Created

  /assesments/{patient_id}:
    get:
      tags:
        - Assesments
      summary: Ambil history assesment pasien tertentu
      parameters:
        - name: patient_id
          in: path
          required: true
          type: integer
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Assesment'

  # --- LAPORAN (ASKEB - SDKI/SIKI) ---
  /laporan/:
    get:
      tags:
        - Laporan
      summary: Get All Laporan (Filtered by Ruangan)
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Laporan'
    post:
      tags:
        - Laporan
      summary: Buat Askeb Baru (Analisis AI)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/LaporanInput'
      responses:
        '201':
          description: Created

  /laporan/{patient_id}:
    get:
      tags:
        - Laporan
      summary: Get Askeb by Patient ID
      parameters:
        - name: patient_id
          in: path
          required: true
          type: integer
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Laporan'
              
  /laporan/search:
    post:
        tags:
            - Laporan
        summary: Cari Laporan (FAISS/Text)
        parameters:
            - in: body
              name: body
              schema:
                $ref: '#/definitions/Query'
        responses:
            '200':
                description: Search results

  # --- CPPT ---
  /cppt/:
    get:
      tags:
        - CPPT
      summary: Get All CPPT
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/CPPT'
    post:
      tags:
        - CPPT
      summary: Buat CPPT Baru (Shift Otomatis, Cek Laporan)
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/CPPTInput'
      responses:
        '201':
          description: Created

  /cppt/{cppt_id}:
    parameters:
      - name: cppt_id
        in: path
        type: integer
        required: true
    get:
      tags:
        - CPPT
      summary: Get One CPPT
      responses:
        '200':
          schema:
            $ref: '#/definitions/CPPT'
    put:
      tags:
        - CPPT
      summary: Update CPPT
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
                subjective: 
                    type: string
                objective:
                    type: string
                assessment:
                    type: string
                plan:
                    type: string
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - CPPT
      summary: Delete CPPT
      responses:
        '200':
          description: Deleted

  # --- INTERVENSI ---
  /intervensi/:
    get:
      tags:
        - Intervensi
      summary: Get All Intervensi
      responses:
        '200':
          schema:
            type: array
            items:
              $ref: '#/definitions/Intervensi'
    post:
      tags:
        - Intervensi
      summary: Buat Intervensi Baru
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/IntervensiInput'
      responses:
        '201':
          description: Created

  /intervensi/{intervensi_id}:
    parameters:
      - name: intervensi_id
        in: path
        required: true
        type: integer
    get:
      tags:
        - Intervensi
      summary: Detail Intervensi
      responses:
        '200':
          schema:
            $ref: '#/definitions/Intervensi'
    put:
      tags:
        - Intervensi
      summary: Update Intervensi
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/Intervensi'
      responses:
        '200':
          description: Updated
    delete:
      tags:
        - Intervensi
      summary: Hapus Intervensi
      responses:
        '200':
          description: Deleted

  # --- PDF PROCESSING ---
  /pdf/process-assesmen:
    post:
      tags:
        - PDF Processing
      summary: Upload PDF Assesmen
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Processed

  /pdf/process-lab:
    post:
      tags:
        - PDF Processing
      summary: Upload PDF Lab
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          type: file
          required: true
        - name: cppt_id
          in: formData
          type: integer
          required: true
      responses:
        '200':
          description: Processed

  /pdf/process-siki-slki-sdki:
    post:
      tags:
        - PDF Processing
      summary: Upload PDF Referensi (Admin/Ketim)
      consumes:
        - multipart/form-data
      parameters:
        - name: file
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Processed